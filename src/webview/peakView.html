<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src 'nonce-{{nonce}}' {{cspSource}};" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Peak understand</title>
	<style>
		:root {
			color: var(--vscode-foreground);
			background: var(--vscode-tab-inactiveBackground, var(--vscode-editor-background));
			font-family: var(--vscode-font-family);
			font-size: var(--vscode-font-size);
		}

		body {
			margin: 0;
			padding: 0;
			display: flex;
			flex-direction: column;
			justify-content: stretch;
			height: 100vh;
			box-sizing: border-box;
		}

		#root {
			flex: 1;
			display: flex;
			flex-direction: column;
			justify-content: stretch;
		}

		#main {
			flex: 1;
		}

		.tab-bar {
			display: flex;
			flex-shrink: 0;
			border-bottom: 1px solid var(--vscode-panel-border, #444);
			background: var(--vscode-editorGroupHeader-tabsBackground, var(--vscode-editor-background));
			overflow-x: auto;
			overflow-y: hidden;
		}

		.tabs {
			display: flex;
			flex-wrap: nowrap;
			min-width: 0;
		}

		.tab {
			display: inline-flex;
			align-items: center;
			gap: 6px;
			background: var(--vscode-tab-inactiveBackground, transparent);
			color: var(--vscode-tab-inactiveForeground, var(--vscode-foreground));
			border: none;
			border-top: 1px solid transparent;
			border-right: 1px solid var(--vscode-panel-border, #444);
			padding: 0 12px;
			height: 35px;
			cursor: pointer;
			font: inherit;
			white-space: nowrap;
			flex-shrink: 0;
		}

		.tab:hover {
			background: var(--vscode-tab-hoverBackground, var(--vscode-tab-inactiveBackground));
			color: var(--vscode-tab-activeForeground, var(--vscode-foreground));
		}

		.tab.active {
			background: var(--vscode-tab-activeBackground, var(--vscode-editor-background));
			color: var(--vscode-tab-activeForeground, var(--vscode-foreground));
			border-top-color: var(--vscode-tab-activeBorderTop, var(--vscode-focusBorder, #007acc));
		}

		.tab svg {
			flex-shrink: 0;
			opacity: 0.85;
		}

		.action-bar {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 8px;
			min-width: 0;
			padding: 4px 8px;
			border-bottom: 1px solid var(--vscode-panel-border, #444);
			flex-shrink: 0;
			background: var(--vscode-tab-inactiveBackground, var(--vscode-editor-background));
		}

		.cursor-breadcrumb {
			flex: 1;
			min-width: 0;
			overflow-x: auto;
			overflow-y: hidden;
			white-space: nowrap;
			display: flex;
			align-items: center;
			color: var(--vscode-breadcrumb-foreground, var(--vscode-descriptionForeground));
			font-size: 0.9em;
		}

		.cursor-breadcrumb:empty {
			display: none;
		}

		.cursor-breadcrumb-segment {
			flex-shrink: 0;
		}

		.cursor-breadcrumb-segment.focus {
			color: var(--vscode-breadcrumb-activeSelectionForeground,
					var(--vscode-breadcrumb-focusForeground, var(--vscode-foreground)));
		}

		.cursor-breadcrumb-sep {
			flex-shrink: 0;
			opacity: 0.65;
			padding: 0 4px;
			user-select: none;
		}

		.action-bar-actions {
			display: flex;
			align-items: center;
			gap: 4px;
			flex-shrink: 0;
		}

		.icon-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 28px;
			height: 28px;
			padding: 0;
			background: transparent;
			color: var(--vscode-foreground);
			border: none;
			border-radius: 4px;
			cursor: pointer;
			flex-shrink: 0;
		}

		.icon-btn:hover:not(:disabled) {
			background: var(--vscode-toolbar-hoverBackground, rgba(90, 93, 94, 0.31));
		}

		.icon-btn:disabled {
			opacity: 0.4;
			cursor: default;
		}

		.icon-btn.hidden {
			display: none;
		}

		.icon-btn svg {
			display: block;
		}

		.zoom-reset-btn {
			width: auto;
			min-width: 48px;
			padding: 0 8px;
			font-size: 0.85em;
		}

		.copy-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			width: 28px;
			height: 28px;
			padding: 0;
			background: var(--vscode-button-background);
			color: var(--vscode-button-foreground);
			border: none;
			border-radius: 4px;
			cursor: pointer;
			flex-shrink: 0;
		}

		.copy-btn:hover {
			background: var(--vscode-button-hoverBackground);
		}

		.main {
			display: flex;
			flex: 1;
			min-height: 0;
			height: 100%;
		}

		.main.layout-right {
			flex-direction: row;
		}

		.main.layout-bottom {
			flex-direction: column;
		}

		#diagramViewport {
			position: relative;
			flex: 1 1 auto;
			overflow: hidden;
			min-width: 0;
			min-height: 0;
			cursor: grab;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		#diagramViewport.panning {
			cursor: grabbing;
		}

		#diagramContent {
			transform-origin: center center;
			padding: 16px;
			flex-shrink: 0;
			width: fit-content;
			width: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			height: fit-content;
		}

		#diagramContent svg {
			display: block;
			max-width: none;
		}

		#diagramContent.has-diagram svg {
			min-width: 1px;
		}

		.diagram-zoom-overlay {
			position: absolute;
			top: 8px;
			left: 8px;
			z-index: 10;
			display: flex;
			align-items: center;
			gap: 2px;
			padding: 2px;
			border-radius: 4px;
			background: var(--vscode-editorWidget-background, var(--vscode-editor-background));
			border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border, #444));
			box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
			font-size: 0.85em;
			pointer-events: auto;
		}

		.diagram-zoom-overlay.hidden {
			display: none;
		}

		.diagram-zoom-overlay .zoom-label {
			min-width: 44px;
			text-align: center;
			padding: 0 4px;
			line-height: 24px;
			cursor: pointer;
			user-select: none;
			border: none;
			background: transparent;
			color: inherit;
			font: inherit;
			border-radius: 2px;
		}

		.diagram-zoom-overlay .zoom-label:hover {
			background: var(--vscode-toolbar-hoverBackground, rgba(90, 93, 94, 0.31));
		}

		.diagram-zoom-overlay .icon-btn {
			width: 24px;
			height: 24px;
		}

		#splitter {
			display: none;
			flex-shrink: 0;
			background: var(--vscode-panel-border, #444);
			z-index: 1;
		}

		.main.layout-right #splitter {
			width: 4px;
			cursor: col-resize;
		}

		.main.layout-bottom #splitter {
			height: 4px;
			cursor: row-resize;
		}

		.main.layout-right #splitter.visible,
		.main.layout-bottom #splitter.visible {
			display: block;
		}

		#definition {
			display: none;
			flex-direction: column;
			flex-shrink: 0;
			min-width: 0;
			min-height: 0;
			background: var(--vscode-tab-inactiveBackground, var(--vscode-editor-background));
		}

		.main.layout-right #definition {
			border-left: 1px solid var(--vscode-panel-border, #444);
		}

		.main.layout-bottom #definition {
			border-top: 1px solid var(--vscode-panel-border, #444);
		}

		#definition.visible {
			display: flex;
		}

		#definitionHeader {
			padding: 8px 12px;
			font-size: 0.9em;
			color: var(--vscode-descriptionForeground);
			border-bottom: 1px solid var(--vscode-panel-border, #444);
			flex-shrink: 0;
		}

		#definition pre {
			margin: 0;
			padding: 12px;
			overflow: auto;
			flex: 1;
			font-family: var(--vscode-editor-font-family);
			font-size: var(--vscode-editor-font-size);
			white-space: pre;
			color: var(--vscode-editor-foreground);
		}

		#definition pre .token-keyword,
		#definition pre .token-modifier {
			color: var(--vscode-symbolIcon-keywordForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-string {
			color: var(--vscode-symbolIcon-stringForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-comment {
			color: var(--vscode-editorIndentGuide-activeBackground, var(--vscode-descriptionForeground));
			font-style: italic;
		}

		#definition pre .token-number {
			color: var(--vscode-symbolIcon-numberForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-type,
		#definition pre .token-class,
		#definition pre .token-interface,
		#definition pre .token-enum,
		#definition pre .token-struct,
		#definition pre .token-typeParameter {
			color: var(--vscode-symbolIcon-classForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-function,
		#definition pre .token-method {
			color: var(--vscode-symbolIcon-functionForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-variable,
		#definition pre .token-parameter {
			color: var(--vscode-symbolIcon-variableForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-property,
		#definition pre .token-member {
			color: var(--vscode-symbolIcon-propertyForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-namespace,
		#definition pre .token-module {
			color: var(--vscode-symbolIcon-namespaceForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-enumMember {
			color: var(--vscode-symbolIcon-enumeratorMemberForeground, var(--vscode-editor-foreground));
		}

		#definition pre .token-operator,
		#definition pre .token-macro {
			color: var(--vscode-editor-foreground);
		}

		.error {
			color: var(--vscode-errorForeground);
			padding: 16px;
		}

		.diagram-modal {
			display: none;
			position: fixed;
			inset: 0;
			z-index: 1000;
			flex-direction: column;
		}

		.diagram-modal.open {
			display: flex;
		}

		.diagram-modal-backdrop {
			position: absolute;
			inset: 0;
			background: var(--vscode-editor-background);
			z-index: 0;
		}

		.diagram-modal-header {
			position: relative;
			display: flex;
			align-items: center;
			gap: 4px;
			padding: 4px 8px;
			background: var(--vscode-editor-background);
			border-bottom: 1px solid var(--vscode-panel-border, #444);
			flex-shrink: 0;
			z-index: 2;
		}

		.diagram-modal-header .spacer {
			flex: 1;
		}

		.diagram-modal-viewport {
			position: relative;
			flex: 1;
			overflow: hidden;
			cursor: grab;
			z-index: 2;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 0;
		}

		.diagram-modal-viewport.panning {
			cursor: grabbing;
		}

		.diagram-modal-content {
			transform-origin: center center;
			padding: 24px;
			flex-shrink: 0;
			width: fit-content;
			height: fit-content;
		}

		.diagram-modal-content svg {
			max-width: none !important;
			min-width: 1px;
			display: block;
		}
	</style>
</head>

<body>
	<div id="root"></div>
	<script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
